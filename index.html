<style>
/* ===== JDS FONTS ===== */
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

/* ===== JDS DESIGN TOKENS ===== */
:root{
  --primary-20:#e8e8fc;--primary-30:#9999ff;--primary-40:#6464ff;--primary-50:#3535f3;
  --primary-60:#000093;--primary-70:#00004c;--primary-80:#010029;
  --secondary-20:#fef7e9;--secondary-30:#ffe3ae;--secondary-40:#ffd947;--secondary-50:#f7ab20;
  --secondary-60:#ac660c;--secondary-70:#7f4b10;--secondary-80:#401d0c;
  --sparkle-20:#e8faf7;--sparkle-30:#a7f6e9;--sparkle-40:#7aebd9;--sparkle-50:#1eccb0;
  --sparkle-60:#1e7b74;--sparkle-70:#0e5c4f;--sparkle-80:#08332c;
  --error:#fa2f40;--warning:#f06d0f;--success:#25ab21;
  --grey-100:#141414;--grey-80:rgba(0,0,0,0.66);--grey-60:#b5b5b5;
  --grey-40:#e0e0e0;--grey-20:#f5f5f5;--white:#ffffff;--black:#141414;
  --surface-default:#ffffff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad;--surface-minimal:#f5f5f5;--surface-moderate:#e3e3e4;
  --text-high:#141414;--text-low:rgba(25,27,30,0.65);--text-disabled:rgba(25,27,30,0.38);
  --text-on-bold:#ffffff;
  --icon-medium:#170054;--icon-high:#141414;
  --stroke-subtle:rgba(36,38,43,0.12);--stroke-minimal:rgba(36,38,43,0.13);
  /* Spacing */
  --sp-4xs:2px;--sp-3xs:4px;--sp-2xs:6px;--sp-xs:8px;--sp-s:12px;--sp-base:14px;
  --sp-m:16px;--sp-l:20px;--sp-xl:24px;--sp-2xl:32px;--sp-3xl:40px;--sp-4xl:48px;
  /* Border Radius */
  --shape-xs:4px;--shape-sm:8px;--shape-md:12px;--shape-lg:16px;--shape-xl:24px;
  --shape-2xl:32px;--shape-pill:999px;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'JioType',sans-serif;background:#141414;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== PHONE FRAME ===== */
.phone-frame{width:100%;max-width:390px;height:100dvh;max-height:844px;margin:0 auto;
  background:var(--surface-default);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:500px){.phone-frame{border-radius:var(--shape-2xl);border:8px solid #222;margin-top:20px;
  height:calc(100dvh - 40px)}}

/* ===== HEADER ===== */
.chat-header{height:56px;padding:0 var(--sp-m);display:flex;align-items:center;gap:var(--sp-s);
  border-bottom:1px solid var(--stroke-subtle);background:var(--surface-default);flex-shrink:0;z-index:10}
.chat-header .back-btn{width:24px;height:24px;color:var(--icon-high);display:flex;align-items:center}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center}
.chat-header .avatar video{width:100%;height:100%;object-fit:cover}
.chat-header .header-info{flex:1;min-width:0}
.chat-header .header-title{font-size:16px;font-weight:700;color:var(--text-high);letter-spacing:-0.5%}
.chat-header .header-status{font-size:12px;font-weight:500;color:var(--sparkle-50);display:flex;align-items:center;gap:4px}
.chat-header .header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sparkle-50)}

/* Persona selector */
.persona-selector{position:relative}
.persona-btn{display:flex;align-items:center;gap:var(--sp-3xs);padding:var(--sp-3xs) var(--sp-xs);
  border-radius:var(--shape-pill);background:var(--surface-ghost);font-size:13px;font-weight:700;
  color:var(--text-high)}
.persona-btn svg{width:16px;height:16px;color:var(--text-low);transition:transform 0.2s}
.persona-btn.open svg{transform:rotate(180deg)}
.persona-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:260px;background:var(--surface-default);
  border-radius:var(--shape-lg);box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:var(--sp-xs);
  display:none;z-index:100}
.persona-dropdown.show{display:block;animation:msgIn 0.2s ease}
.persona-option{display:flex;align-items:center;gap:var(--sp-s);padding:var(--sp-s) var(--sp-s);
  border-radius:var(--shape-md);width:100%;text-align:left;transition:background 0.15s}
.persona-option:hover{background:var(--surface-ghost)}
.persona-option.active{background:var(--primary-20)}
.persona-option .p-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0}
.persona-option .p-info .p-name{font-size:14px;font-weight:700;color:var(--text-high)}
.persona-option .p-info .p-desc{font-size:12px;font-weight:500;color:var(--text-low);margin-top:2px}

/* ===== CHAT BODY ===== */
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:var(--sp-m);display:flex;flex-direction:column;gap:var(--sp-s);
  scroll-behavior:smooth}

/* Messages */
.msg{max-width:85%;animation:msgIn 0.35s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg .bubble{padding:var(--sp-s) var(--sp-m);font-size:15px;font-weight:500;line-height:1.5;
  letter-spacing:-0.5%}
.msg.ai .bubble{background:var(--surface-ghost);color:var(--text-high);
  border-radius:var(--shape-xs) var(--shape-lg) var(--shape-lg) var(--shape-lg)}
.msg.user .bubble{background:var(--primary-50);color:var(--text-on-bold);
  border-radius:var(--shape-lg) var(--shape-xs) var(--shape-lg) var(--shape-lg)}

/* Typing indicator */
.typing{align-self:flex-start;display:none}
.typing .bubble{background:var(--surface-ghost);border-radius:var(--shape-xs) var(--shape-lg) var(--shape-lg) var(--shape-lg);
  padding:var(--sp-s) var(--sp-l);display:flex;gap:4px;align-items:center}
.typing .dot{width:7px;height:7px;border-radius:50%;background:var(--grey-60);animation:typingAnim 1.4s ease infinite}
.typing .dot:nth-child(2){animation-delay:0.2s}
.typing .dot:nth-child(3){animation-delay:0.4s}

/* Chips */
.chips-row{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-self:flex-start;animation:msgIn 0.35s ease}
.chip{padding:var(--sp-xs) var(--sp-m);border-radius:var(--shape-pill);border:1.5px solid var(--primary-50);
  font-size:14px;font-weight:700;color:var(--primary-50);background:var(--surface-default);
  transition:all 0.15s;white-space:nowrap}
.chip:active{background:var(--primary-50);color:var(--text-on-bold)}
.chips-row.disabled{pointer-events:none;opacity:0.38}
.chip.selected{background:var(--primary-50);color:var(--text-on-bold)}

/* ===== SPECIAL CARDS ===== */
.card{border-radius:var(--shape-lg);padding:var(--sp-l);animation:msgIn 0.35s ease;align-self:flex-start;
  max-width:90%;width:100%}

/* Memory card */
.memory-card{background:var(--primary-20);border:1px solid var(--primary-30)}
.memory-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--primary-50);margin-bottom:var(--sp-xs)}
.memory-card .card-text{font-size:15px;font-weight:500;line-height:1.5;color:var(--text-high)}

/* Mood shift card */
.mood-card{background:var(--sparkle-20);border:1px solid var(--sparkle-30)}
.mood-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--sparkle-60);margin-bottom:var(--sp-xs)}
.mood-card .card-text{font-size:15px;font-weight:500;line-height:1.5;color:var(--text-high)}
.mood-card .mood-icon{font-size:32px;margin-bottom:var(--sp-xs)}

/* Celebration card */
.celebration-card{text-align:center;padding:var(--sp-xl) var(--sp-l)}
.celebration-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:var(--sp-s)}
.celebration-card .celebration-icon{margin-bottom:var(--sp-s)}
.celebration-card .celebration-quote{font-size:18px;font-weight:700;line-height:1.6;color:var(--text-high);
  margin-bottom:var(--sp-s)}
.celebration-card .celebration-signoff{font-size:14px;font-weight:500;color:var(--text-low);line-height:1.5}

/* Celebration card — Ramesh (sparkle) */
.celebration-card.celebrate-ramesh{background:var(--sparkle-20);border:1px solid var(--sparkle-30)}
.celebration-card.celebrate-ramesh .card-label{color:var(--sparkle-60)}

/* Celebration card — Sharma (secondary) */
.celebration-card.celebrate-sharma{background:var(--secondary-20);border:1px solid var(--secondary-30)}
.celebration-card.celebrate-sharma .card-label{color:var(--secondary-60)}

/* Celebration card — Aisha (primary) */
.celebration-card.celebrate-aisha{background:var(--primary-20);border:1px solid var(--primary-30)}
.celebration-card.celebrate-aisha .card-label{color:var(--primary-50)}

/* Music card */
.music-card{background:var(--primary-20);border:1px solid var(--primary-30);padding:var(--sp-l)}
.music-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--primary-50);margin-bottom:var(--sp-s)}
.music-card .music-info{margin-bottom:var(--sp-s)}
.music-card .music-title{font-size:16px;font-weight:700;color:var(--text-high)}
.music-card .music-artist{font-size:14px;font-weight:500;color:var(--text-low);margin-top:var(--sp-3xs)}
.music-card .music-controls{display:flex;align-items:center;gap:var(--sp-s)}
.music-card .play-music-btn{padding:var(--sp-xs) var(--sp-l);border-radius:var(--shape-pill);
  background:var(--primary-50);color:var(--white);font-size:14px;font-weight:700;
  font-family:'JioType',sans-serif;flex-shrink:0;display:flex;align-items:center;gap:var(--sp-xs)}
.music-card .play-music-btn svg{width:16px;height:16px}
.music-card .progress-bar{flex:1;height:6px;border-radius:var(--shape-pill);background:var(--surface-ghost);
  overflow:hidden}
.music-card .progress-fill{height:100%;width:0%;border-radius:var(--shape-pill);background:var(--primary-50);
  transition:width 0.3s linear}

/* Sign-off summary card */
.summary-card{background:var(--surface-ghost);border:1px solid var(--stroke-subtle)}
.summary-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--text-low);margin-bottom:var(--sp-s)}
.summary-card .mood-arc{display:flex;align-items:center;gap:var(--sp-xs);margin-bottom:var(--sp-s)}
.summary-card .mood-arc .arc-dot{width:10px;height:10px;border-radius:50%}
.summary-card .mood-arc .arc-line{flex:1;height:2px;border-radius:999px}
.summary-card .summary-text{font-size:15px;font-weight:500;line-height:1.5;color:var(--text-high)}
.summary-card .summary-time{font-size:13px;font-weight:700;color:var(--primary-50);margin-top:var(--sp-s);
  display:flex;align-items:center;gap:var(--sp-xs)}

/* ===== INPUT BAR (JDS ChatInput) ===== */
.input-bar{padding:var(--sp-xs) var(--sp-m) var(--sp-m);background:var(--surface-default);
  border-top:1px solid var(--stroke-subtle);flex-shrink:0;display:flex;align-items:center;gap:var(--sp-xs)}
.jds-chat-input{background:var(--surface-ghost);border-radius:var(--shape-pill);padding:var(--sp-xs) var(--sp-s);
  display:flex;align-items:center;gap:var(--sp-xs);flex:1}
.jds-chat-input input{flex:1;border:none;background:none;font-family:'JioType',sans-serif;font-size:15px;
  font-weight:500;color:var(--text-high);outline:none;min-width:0}
.jds-chat-input input::placeholder{color:var(--text-disabled)}
.jds-chat-input .icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:var(--icon-medium);flex-shrink:0;transition:all 0.15s}
.speak-btn{width:44px;height:44px;border-radius:50%;background:var(--surface-bold);color:var(--text-on-bold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.speak-btn:active{transform:scale(0.92)}
.speak-btn svg{width:22px;height:22px}

/* TTS pause bar */
.tts-pause-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--grey-100);
  color:var(--white);border-radius:var(--shape-pill);padding:var(--sp-xs) var(--sp-l);
  display:none;align-items:center;gap:var(--sp-s);font-size:13px;font-weight:700;z-index:50;
  box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.tts-pause-bar.show{display:flex}
.tts-pause-bar button{color:var(--white);display:flex;align-items:center}

/* ===== ANIMATIONS ===== */
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes typingAnim{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Skeleton */
.skeleton{border-radius:var(--shape-md);background:linear-gradient(90deg,var(--surface-ghost) 25%,
  var(--surface-moderate) 50%,var(--surface-ghost) 75%);background-size:200% 100%;
  animation:shimmer 1.5s infinite;align-self:flex-start}
.skeleton-line{height:16px;margin-bottom:var(--sp-xs)}
.skeleton-line:first-child{width:80%}
.skeleton-line:nth-child(2){width:60%}
.skeleton-line:last-child{width:40%}

/* Scrollbar */
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--grey-40);border-radius:999px}
</style>
</head>

<script>
/* ===== PERSONA DATA ===== */
const PERSONAS = {
  ramesh: {
    name: 'Ramesh',
    label: 'Ramesh',
    voiceId: 'RXCCWbOxP7Hisa63Xsv5', // Calming male voice
    greeting: 'रमेश भाई! कल रात तूने फोरमैन गुप्ता जी के बारे में बताया था... आज कैसा रहा उसका मूड? तू ठीक है ना?',

    memoryText: 'Kal raat Ramesh ne bataya tha ki foreman Gupta ji ne sabke saamne daanta. Bahut bura laga tha usko. Ghar ki yaad aa rahi thi.',
    flow: [
      { type: 'chips', options: ['Aaj bhi wahi haal hai yaar', 'Thoda better hai aaj', 'Chhod yaar, mann nahi'] },
      {
        'Aaj bhi wahi haal hai yaar': [
          { type: 'ai', text: 'हम्म... समझ सकता हूँ यार। रोज़ का ये सीन बहुत थका देता है। क्या हुआ exactly आज? फिर से वही overtime का चक्कर?' },
          { type: 'chips', options: ['Haan, 2 ghante extra lagwaye', 'Nahi aaj alag baat hai', 'Bas ghar jaana hai'] },

let _ttsCache = new Map();
let _audioCtx = null;
let _musicAudio = null;
let _musicProgressInterval = null;

/* ===== ELEVENLABS TTS ===== */
const TTS_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const TTS_MODEL = 'eleven_multilingual_v2';

function unlockAudio(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
}

async function speakText(text, voiceId){
  const key = text + voiceId;
  let url = _ttsCache.get(key);
  if(!url){
    try{
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
        method:'POST',headers:{'Content-Type':'application/json','xi-api-key':TTS_KEY},
        body:JSON.stringify({text,model_id:TTS_MODEL,voice_settings:{stability:0.6,similarity_boost:0.8}})
      });
      if(!res.ok) throw new Error('TTS failed');
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      _ttsCache.set(key, url);
    }catch(e){
      console.warn('TTS error, using browser fallback',e);
      return new Promise(r=>{
        const u=new SpeechSynthesisUtterance(text);u.lang='hi-IN';u.onend=()=>r();
        speechSynthesis.speak(u);
      });
    }
  }
  return new Promise(resolve=>{
    stopTTS();
    const a = new Audio(url);
    _currentAudio = a;
    ttsPauseBar.classList.add('show');
    // Set avatar to speaking
    document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Speaking_State.mp4';
    a.onended = ()=>{ finishTTS(); resolve(); };
    a.onerror = ()=>{ finishTTS(); resolve(); };
    a.play().catch(()=>{ finishTTS(); resolve(); });
  });
}

function stopTTS(){
  if(_currentAudio){_currentAudio.pause();_currentAudio.currentTime=0;_currentAudio=null;}
  finishTTS();
}

function finishTTS(){
  ttsPauseBar.classList.remove('show');
  document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Idle_state.mp4';
}

document.getElementById('ttsPauseBtn').onclick = ()=> stopTTS();

/* ===== HELPERS ===== */
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function scrollToBottom(){
  setTimeout(()=>{ chatArea.scrollTop = chatArea.scrollHeight; },50);
}

function showTyping(){ typingEl.style.display='block'; chatArea.appendChild(typingEl); scrollToBottom(); }
function hideTyping(){ typingEl.style.display='none'; }

async function addMsg(type, html, delay=600){
  showTyping();
  await wait(delay);
  hideTyping();
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${html}</div>`;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

async function addRaw(html, delay=600){
  showTyping();
  await wait(delay);
  hideTyping();
  const div = document.createElement('div');
  div.innerHTML = html;
  const child = div.firstElementChild;
  chatArea.appendChild(child);
  scrollToBottom();
  return child;
}

function addChips(options, callback){
  const row = document.createElement('div');
  row.className = 'chips-row';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = opt;
    btn.onclick = ()=>{
      unlockAudio();
      row.classList.add('disabled');
      btn.classList.add('selected');
      addMsg('user', opt, 100);
      callback(opt);
    };
    row.appendChild(btn);
  });
  chatArea.appendChild(row);
  scrollToBottom();
}

/* ===== MUSIC PLAYER ===== */
function stopMusic(){
  if(_musicAudio){
    _musicAudio.pause();
    _musicAudio.currentTime = 0;
    _musicAudio = null;
  }
  if(_musicProgressInterval){
    clearInterval(_musicProgressInterval);
    _musicProgressInterval = null;
  }
}

function setupMusicPlayer(){
  const playBtn = document.getElementById('musicPlayBtn');
  const progressFill = document.querySelector('.music-card .progress-fill');
  if(!playBtn || !progressFill) return;

  // SVG icons for play/stop
  const playSvg = '<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M19.15 10.36l-10-7A2 2 0 006 5v14a2 2 0 003.15 1.64l10-7a2 2 0 000-3.28z" fill="currentColor"/></svg> Play';
  const stopSvg = '<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M16.84 4H7.16A3.16 3.16 0 004 7.16v9.68A3.16 3.16 0 007.16 20h9.68A3.16 3.16 0 0020 16.84V7.16A3.16 3.16 0 0016.84 4z" fill="currentColor"/></svg> Pause';

  playBtn.innerHTML = playSvg;
  let isPlaying = false;

  if(!_musicAudio){
    _musicAudio = new Audio('tum-hi-ho.mp3');
  }

  playBtn.onclick = ()=>{
    unlockAudio();
    if(!isPlaying){
      _musicAudio.play().catch(e=> console.warn('Music play error', e));
      isPlaying = true;
      playBtn.innerHTML = stopSvg;
      _musicProgressInterval = setInterval(()=>{
        if(_musicAudio && _musicAudio.duration){
          const pct = (_musicAudio.currentTime / _musicAudio.duration) * 100;
          progressFill.style.width = pct + '%';
        }
      }, 300);
    } else {
      _musicAudio.pause();
      isPlaying = false;
      playBtn.innerHTML = playSvg;
      if(_musicProgressInterval){ clearInterval(_musicProgressInterval); _musicProgressInterval = null; }
    }
  };

  _musicAudio.onended = ()=>{
    isPlaying = false;
    playBtn.innerHTML = playSvg;
    progressFill.style.width = '0%';
    if(_musicProgressInterval){ clearInterval(_musicProgressInterval); _musicProgressInterval = null; }
  };
}

/* ===== FLOW ENGINE ===== */
async function startFlow(){
  // Clear chat
  chatArea.querySelectorAll('.msg,.card,.chips-row,.skeleton,.music-card').forEach(el=>el.remove());
  stateTransitioning = false;
  currentState = 'greeting';
  stopMusic();
  const p = PERSONAS[currentPersona];

  await wait(500);

  // ACT 1: Memory card + Greeting
  await addRaw(`
    <div class="card memory-card">
      <div class="card-label">${p.memoryLabel}</div>
      <div class="card-text">${p.memoryText}</div>
    </div>
  `, 800);

  await addMsg('ai', p.greeting, 1000);
  await speakText(p.greeting, p.voiceId);

  // Show first chips
  currentState = 'act1-response';
  addChips(p.flow[0].options, (choice)=> handleAct1Response(choice));
}

async function handleAct1Response(choice){
  if(stateTransitioning) return;
  stateTransitioning = true;
  currentState = 'act2';
  const p = PERSONAS[currentPersona];
  const responses = p.flow[1][choice];

  if(responses){
    for(const item of responses){
      if(item.type === 'ai'){
        await addMsg('ai', item.text, 800);
        await speakText(item.text, p.voiceId);
      } else if(item.type === 'chips'){
        stateTransitioning = false;
        addChips(item.options, (c)=> handleAct2Response(c));
        return;
      }
    }
  }
  stateTransitioning = false;
}

async function handleAct2Response(choice){
  if(stateTransitioning) return;
  stateTransitioning = true;
  currentState = 'deepening';
  const p = PERSONAS[currentPersona];

  // ACT 2: Deepening emotional conversation
  // Show deepening[0] (ai message) and deepening[1] (chips), then wait for chip pick
  for(const item of p.deepening){
    if(item.type === 'ai'){
      await addMsg('ai', item.text, 1000);
      await speakText(item.text, p.voiceId);
    } else if(item.type === 'chips'){
      stateTransitioning = false;
      addChips(item.options, (c)=> handleDeepeningResponse(c));
      return;
    }
  }
  stateTransitioning = false;
}

async function handleDeepeningResponse(choice){
  if(stateTransitioning) return;
  stateTransitioning = true;
  currentState = 'deepening-2';
  const p = PERSONAS[currentPersona];

  // Show the last deepening message (index 2) which hasn't been shown yet
  const lastMsg = p.deepening[p.deepening.length - 1];
  if(lastMsg.type === 'ai'){
    await addMsg('ai', lastMsg.text, 1000);
    await speakText(lastMsg.text, p.voiceId);
  }

  await wait(1500);

  // ACT 3: Mood Shift
  currentState = 'mood-shift';
  const ms = p.moodShift;

  await addRaw(`
    <div class="card mood-card">
      <div class="card-label">MOOD SHIFT</div>
      <div class="card-text">${ms.trigger}</div>
    </div>
  `, 1000);

  await speakText(ms.trigger, p.voiceId);

  // Mood shift follow-up
  for(const item of ms.followUp){
    if(item.type === 'chips'){
      stateTransitioning = false;
      addChips(item.options, (c)=> handleMoodShiftResponse(c));
      return;
    }
  }
  stateTransitioning = false;
}

async function handleMoodShiftResponse(choice){
  if(stateTransitioning) return;
  stateTransitioning = true;
  currentState = 'mood-shift-2';
  const p = PERSONAS[currentPersona];
  const followUpAi = p.moodShift.followUp.find(i=>i.type==='ai');

  if(followUpAi){
    await addMsg('ai', followUpAi.text, 800);
    await speakText(followUpAi.text, p.voiceId);
  }

  // Show music player for Aisha after mood shift AI response
  if(currentPersona === 'aisha' && p.moodShift.showMusicPlayer){
    await addRaw(`
      <div class="card music-card">
        <div class="card-label">NOW PLAYING</div>
        <div class="music-info">
          <div class="music-title">Tum Hi Ho</div>
          <div class="music-artist">Arijit Singh</div>
        </div>
        <div class="music-controls">
          <button class="play-music-btn" id="musicPlayBtn"></button>
          <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
      </div>
    `, 600);
    setupMusicPlayer();
  }

  await wait(1500);

  // ACT 4: Celebration card (replaces voice recording)
  currentState = 'celebration';
  const cel = p.celebration;

  // Show the reflection prompt as a regular AI message
  const reflectionPrompt = getReflectionPrompt(currentPersona);
  await addMsg('ai', reflectionPrompt, 1000);
  await speakText(reflectionPrompt, p.voiceId);

  await wait(800);

  // Show celebration card
  await addRaw(`
    <div class="card celebration-card ${cel.cardClass}">
      <div class="card-label">${cel.label}</div>
      <div class="celebration-icon">${cel.icon}</div>
      <div class="celebration-quote">${cel.quote}</div>
      <div class="celebration-signoff">${cel.signoff}</div>
    </div>
  `, 800);

  await wait(1500);

  // ACT 5: Sign-off summary
  currentState = 'signoff';
  const so = p.signOff;

  await addRaw(`
    <div class="card summary-card">
      <div class="card-label">AAJ KI BAAT</div>
      <div class="mood-arc">
        <div class="arc-dot" style="background:${so.startMood}"></div>
        <div class="arc-line" style="background:linear-gradient(90deg,${so.startMood},${so.midMood})"></div>
        <div class="arc-dot" style="background:${so.midMood}"></div>
        <div class="arc-line" style="background:linear-gradient(90deg,${so.midMood},${so.endMood})"></div>
        <div class="arc-dot" style="background:${so.endMood}"></div>
      </div>
      <div class="summary-text">${so.summary}</div>
      <div class="summary-time">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M10 4h4a1 1 0 100-2h-4a1 1 0 000 2zm8.71 2.71a1 1 0 101.41-1.42l-1.41-1.41a1 1 0 10-1.42 1.41l1.42 1.42zM12 5a8.5 8.5 0 108.5 8.5A8.51 8.51 0 0012 5zm1 8a1 1 0 01-2 0V9a1 1 0 012 0v4z" fill="currentColor"/></svg>
        ${so.nextTime}
      </div>
    </div>
  `, 800);

  currentState = 'done';
}

function getReflectionPrompt(persona){
  switch(persona){
    case 'ramesh':
      return 'रमेश, आज की बात सुनके लगता है तू थोड़ा हल्का feel कर रहा है। याद रखना — रोज़ थोड़ा थोड़ा जीतना, यही तो असली strength है।';
    case 'sharma':
      return 'शर्मा जी, आज की बात में बहुत कुछ था — अंकित की याद, थोड़ी तहज़ीब की चर्चा, और आपकी वो ख़ास मुस्कान। बहुत अच्छा लगा बात करके।';
    case 'aisha':
      return 'आइशा, आज की बात में बहुत honesty थी। मैं proud हूँ कि तू open up करती है। ये तेरी strength है।';
    default:
      return '';
  }
}

/* ===== TEXT INPUT ===== */
chatInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && chatInput.value.trim()){
    const text = chatInput.value.trim();
    chatInput.value = '';
    addMsg('user', text, 100);
  }
});

/* ===== SPEAK BUTTON (triggers same as chip) ===== */
document.getElementById('speakBtn').onclick = ()=>{
  unlockAudio();
  // If not started, start flow
  if(currentState === 'idle') startFlow();
};

/* ===== INIT ===== */
document.addEventListener('click', unlockAudio, {once:true});
document.addEventListener('touchstart', unlockAudio, {once:true});

// Auto-start
setTimeout(()=> startFlow(), 800);
</script>
