<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Subah Ka Briefing — JBIQ</title>
<style>
/* ===== JDS FONTS ===== */
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

:root{
  --primary-20:#e8e8fc;--primary-30:#9999ff;--primary-40:#6464ff;--primary-50:#3535f3;
  --primary-60:#000093;
  --secondary-20:#fef7e9;--secondary-30:#ffe3ae;--secondary-50:#f7ab20;--secondary-60:#ac660c;
  --sparkle-20:#e8faf7;--sparkle-30:#a7f6e9;--sparkle-50:#1eccb0;--sparkle-60:#1e7b74;
  --error:#fa2f40;--warning:#f06d0f;--success:#25ab21;
  --grey-100:#141414;--grey-80:rgba(0,0,0,0.66);--grey-60:#b5b5b5;
  --grey-40:#e0e0e0;--grey-20:#f5f5f5;
  --surface-default:#ffffff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad;
  --text-high:#141414;--text-low:rgba(25,27,30,0.65);--text-disabled:rgba(25,27,30,0.38);
  --text-on-bold:#ffffff;
  --stroke-subtle:rgba(36,38,43,0.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'JioType';
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== DESKTOP: centred phone ===== */
body{background:#f0f0f5;display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:40px 20px}
.phone-frame{width:360px;height:800px;border-radius:32px;border:2px solid var(--grey-100);
  box-shadow:0 24px 80px rgba(0,0,0,0.15);overflow:hidden;position:relative;
  background:var(--surface-default);display:flex;flex-direction:column}

/* Status bar */
.status-bar{height:44px;padding:14px 20px 0;display:flex;align-items:flex-start;
  justify-content:space-between;font-size:13px;font-weight:700;color:var(--text-high);
  background:var(--surface-default);flex-shrink:0;z-index:5}
.status-right{display:flex;align-items:center;gap:6px;font-size:12px}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:28px;
  background:var(--grey-100);border-radius:0 0 16px 16px;z-index:20}
.home-indicator{height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home-indicator .pill{width:120px;height:4px;border-radius:999px;background:var(--grey-100)}

/* ===== MOBILE: full-screen ===== */
@media(max-width:768px){
  body{background:#fff!important;padding:0!important;align-items:stretch!important}
  .phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;
    border-radius:0!important;box-shadow:none!important;border:none!important;max-width:100%!important}
  .notch,.status-bar,.home-indicator{display:none!important}
}

/* ===== HEADER ===== */
.chat-header{height:56px;padding:0 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--stroke-subtle);background:var(--surface-default);flex-shrink:0;z-index:10}
.back-btn{width:24px;height:24px;color:var(--text-high);display:flex;align-items:center;flex-shrink:0}
.avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center}
.avatar video{width:100%;height:100%;object-fit:cover}
.header-info{flex:1}
.header-title{font-size:16px;font-weight:700;color:var(--text-high)}
.header-sub{font-size:12px;font-weight:500;color:var(--sparkle-50);display:flex;align-items:center;gap:4px}
.header-sub::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sparkle-50)}

/* ===== CHAT ===== */
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;
  scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:2px}
.chat-area::-webkit-scrollbar-thumb{background:var(--grey-40);border-radius:999px}

/* Section divider */
.section-divider{display:flex;align-items:center;gap:12px;padding:14px 0 6px;align-self:stretch}
.section-divider .line{flex:1;height:1px;background:var(--stroke-subtle)}
.section-divider .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-disabled);white-space:nowrap}

/* Messages */
.msg{max-width:88%;animation:msgIn 0.4s cubic-bezier(0.22,1,0.36,1)}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.bubble{padding:12px 16px;font-size:15px;font-weight:500;line-height:1.55}
.msg.ai .bubble{background:var(--surface-ghost);color:var(--text-high);
  border-radius:4px 16px 16px 16px}
.msg.user .bubble{background:var(--primary-50);color:var(--text-on-bold);
  border-radius:16px 4px 16px 16px}
.bubble strong{font-weight:700}

/* Typing */
.typing{align-self:flex-start;display:flex}
.typing .bubble{background:var(--surface-ghost);border-radius:4px 16px 16px 16px;
  padding:14px 20px;display:flex;gap:5px;align-items:center}
.typing .dot{width:7px;height:7px;border-radius:50%;background:var(--grey-60);animation:typeDot 1.4s ease infinite}
.typing .dot:nth-child(2){animation-delay:0.2s}
.typing .dot:nth-child(3){animation-delay:0.4s}

/* Chips */
.chips-row{display:flex;flex-wrap:wrap;gap:8px;align-self:flex-start;animation:msgIn 0.4s cubic-bezier(0.22,1,0.36,1)}
.chip{padding:8px 16px;border-radius:999px;border:1.5px solid var(--primary-50);
  font-size:14px;font-weight:700;color:var(--primary-50);background:var(--surface-default);
  transition:all 0.15s;white-space:nowrap}
.chip:active{background:var(--primary-50);color:var(--text-on-bold)}
.chips-row.used{pointer-events:none;opacity:0.38}
.chip.picked{background:var(--primary-50);color:var(--text-on-bold);pointer-events:none}

/* ===== RICH CARDS ===== */
.card{border-radius:16px;padding:16px;animation:msgIn 0.4s cubic-bezier(0.22,1,0.36,1);
  align-self:flex-start;max-width:92%;width:100%;margin:2px 0}
.card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}

/* Weather */
.card.weather{background:var(--primary-20);border:1px solid var(--primary-30)}
.card.weather .card-label{color:var(--primary-50)}
.weather-main{display:flex;align-items:center;gap:14px}
.weather-icon{width:44px;height:44px;color:var(--secondary-50);flex-shrink:0}
.weather-temp{font-size:40px;font-weight:900;color:var(--text-high);line-height:1}
.weather-info{flex:1}
.weather-info p{font-size:13px;font-weight:500;color:var(--text-low);line-height:1.55}
.weather-info strong{color:var(--text-high);font-weight:700}
.weather-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.wtag{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
  background:var(--surface-default);color:var(--primary-50);border:1px solid var(--primary-30)}

/* Family */
.card.family{background:var(--sparkle-20);border:1px solid var(--sparkle-30)}
.card.family .card-label{color:var(--sparkle-60)}
.fam-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(30,204,176,0.12)}
.fam-row:last-child{border-bottom:none}
.fam-avi{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.fam-text{font-size:13px;font-weight:500;color:var(--text-high);line-height:1.55;flex:1}
.fam-text strong{font-weight:700}
.fam-tag{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;
  margin-top:4px}
.tag-alert{background:rgba(250,47,64,0.1);color:var(--error)}
.tag-info{background:var(--primary-20);color:var(--primary-50)}

/* Alert */
.card.alert{background:rgba(250,47,64,0.05);border:1px solid rgba(250,47,64,0.15)}
.card.alert .card-label{color:var(--error)}
.alert-body{display:flex;align-items:flex-start;gap:10px}
.alert-icon{width:32px;height:32px;border-radius:50%;background:rgba(250,47,64,0.1);
  color:var(--error);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-text{font-size:13px;font-weight:500;color:var(--text-high);line-height:1.55;flex:1}
.alert-text strong{font-weight:700}
.alert-action{margin-top:8px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;
  background:var(--error);color:var(--surface-default);display:inline-flex;align-items:center;gap:4px}

/* Grocery */
.card.grocery{background:var(--secondary-20);border:1px solid var(--secondary-30)}
.card.grocery .card-label{color:var(--secondary-60)}
.grocery-chips{display:flex;flex-wrap:wrap;gap:6px}
.gchip{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;
  background:var(--surface-default);color:var(--secondary-60);border:1px solid var(--secondary-30);
  display:flex;align-items:center;gap:4px}

/* Schedule */
.card.schedule{background:var(--surface-default);border:1px solid var(--stroke-subtle);
  box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.card.schedule .card-label{color:var(--text-low)}
.sched-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--stroke-subtle)}
.sched-row:last-child{border-bottom:none}
.sched-time{font-size:12px;font-weight:700;color:var(--primary-50);min-width:40px;
  flex-shrink:0;padding-top:1px}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sched-body{flex:1}
.sched-title{font-size:13px;font-weight:700;color:var(--text-high)}
.sched-desc{font-size:11px;font-weight:500;color:var(--text-low);margin-top:1px}

/* Priority checklist */
.card.priorities{background:var(--surface-ghost);border:1px solid var(--stroke-subtle)}
.card.priorities .card-label{color:var(--text-low)}
.pri-row{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--stroke-subtle);cursor:pointer}
.pri-row:last-child{border-bottom:none}
.pri-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--grey-40);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.pri-check.done{background:var(--sparkle-50);border-color:var(--sparkle-50);color:#fff}
.pri-check svg{width:12px;height:12px;opacity:0}
.pri-check.done svg{opacity:1}
.pri-label{font-size:13px;font-weight:500;color:var(--text-high);flex:1;transition:all 0.2s}
.pri-label.struck{text-decoration:line-through;color:var(--text-low)}
.pri-time{font-size:11px;font-weight:700;color:var(--text-disabled);flex-shrink:0}

/* ===== INPUT BAR ===== */
.input-bar{padding:8px 16px 16px;background:var(--surface-default);
  border-top:1px solid var(--stroke-subtle);flex-shrink:0;display:flex;align-items:center;gap:8px}
.chat-input-wrap{background:var(--surface-ghost);border-radius:999px;padding:6px 12px;
  display:flex;align-items:center;gap:6px;flex:1}
.chat-input-wrap input{flex:1;border:none;background:none;font-family:'JioType';font-size:15px;
  font-weight:500;color:var(--text-high);outline:none;min-width:0}
.chat-input-wrap input::placeholder{color:var(--text-disabled)}
.speak-btn{width:44px;height:44px;border-radius:50%;background:var(--surface-bold);
  color:var(--text-on-bold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.speak-btn:active{transform:scale(0.92)}

/* TTS bar */
.tts-bar{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);background:var(--grey-100);
  color:#fff;border-radius:999px;padding:8px 20px;display:none;align-items:center;gap:10px;
  font-size:13px;font-weight:700;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.tts-bar.show{display:flex}
.tts-bar button{color:#fff;display:flex;align-items:center}
.tts-wave{display:flex;align-items:center;gap:2px;height:16px}
.tts-wave span{width:3px;border-radius:999px;background:#fff;animation:wave 0.8s ease infinite}
.tts-wave span:nth-child(1){height:6px;animation-delay:0s}
.tts-wave span:nth-child(2){height:12px;animation-delay:0.15s}
.tts-wave span:nth-child(3){height:8px;animation-delay:0.3s}
.tts-wave span:nth-child(4){height:14px;animation-delay:0.1s}
.tts-wave span:nth-child(5){height:6px;animation-delay:0.25s}

/* Toast */
.toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--grey-100);color:#fff;border-radius:12px;padding:10px 16px;font-size:14px;
  font-weight:500;z-index:100;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Animations */
@keyframes msgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes typeDot{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes wave{0%,100%{height:4px}50%{height:14px}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="notch"></div>
  <div class="status-bar">
    <span>7:14</span>
    <div class="status-right">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--text-high)"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--text-high)"><path d="M8 3.6c1.8 0 3.4.7 4.6 1.9l1.1-1.1C12.1 2.8 10.1 2 8 2S3.9 2.8 2.3 4.4l1.1 1.1C4.6 4.3 6.2 3.6 8 3.6zm0 3.2c1 0 1.9.4 2.6 1l1.1-1.1C10.6 5.6 9.4 5.2 8 5.2s-2.6.4-3.7 1.5l1.1 1.1c.7-.6 1.6-1 2.6-1zM8 10c.6 0 1-.4 1-1s-.4-1-1-1-1 .4-1 1 .4 1 1 1z"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12" fill="var(--text-high)"><rect x="0" y="1" width="18" height="10" rx="2" fill="none" stroke="var(--text-high)" stroke-width="1.2"/><rect x="1.5" y="2.5" width="12" height="7" rx="1" fill="var(--success)"/><rect x="19" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="chat-header">
    <button class="back-btn" onclick="window.location.href='https://sunit1986.github.io/design-prototypes/companion-tools.html'"><svg viewBox="0 0 24 24" fill="none" width="24" height="24"><path d="M15 20a1.003 1.003 0 01-.71-.29l-7-7a1 1 0 010-1.42l7-7a1.005 1.005 0 011.42 1.42L9.41 12l6.3 6.29a.997.997 0 01.219 1.095.999.999 0 01-.93.615z" fill="currentColor"/></svg></button>
    <div class="avatar">
      <video src="https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Idle_state.mp4" autoplay loop muted playsinline id="avatarVid"></video>
    </div>
    <div class="header-info">
      <div class="header-title">JBIQ</div>
      <div class="header-sub">Subah Ka Briefing</div>
    </div>
  </div>

  <div class="chat-body">
    <div class="chat-area" id="chat"></div>
    <div class="input-bar">
      <div class="chat-input-wrap">
        <input type="text" placeholder="Kuch puchna hai..." id="chatInput">
      </div>
      <button class="speak-btn" id="speakBtn"><svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm5-3a1 1 0 00-2 0 3 3 0 01-6 0 1 1 0 00-2 0 5 5 0 004 4.9V19H9a1 1 0 000 2h6a1 1 0 000-2h-2v-2.1A5 5 0 0017 12z" fill="currentColor"/></svg></button>
    </div>
  </div>

  <div class="tts-bar" id="ttsBar">
    <div class="tts-wave"><span></span><span></span><span></span><span></span><span></span></div>
    <span>Bol rahi hoon...</span>
    <button onclick="stopTTS()"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M16.84 4H7.16A3.16 3.16 0 004 7.16v9.68A3.16 3.16 0 007.16 20h9.68A3.16 3.16 0 0020 16.84V7.16A3.16 3.16 0 0016.84 4z" fill="currentColor"/></svg></button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="home-indicator"><div class="pill"></div></div>
</div>

<script>
/* ===== GLOBALS ===== */
const chat = document.getElementById('chat');
const avatarVid = document.getElementById('avatarVid');
let _audio = null;

const ELEVEN_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const VOICE_ID = '1qEiC6qsybMkmnNdVMbK'; // Monika

function wait(ms){ return new Promise(r=>setTimeout(r,ms)) }
function scroll(){ chat.scrollTop = chat.scrollHeight }

function toast(t){
  const el = document.getElementById('toast');
  el.textContent = t; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

/* ===== ADD ELEMENTS ===== */
async function typing(ms=900){
  const d = document.createElement('div');
  d.className='typing'; d.id='_typing';
  d.innerHTML='<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(d); scroll();
  await wait(ms);
  d.remove();
}

async function aiMsg(html, delay=900){
  await typing(delay);
  const d = document.createElement('div');
  d.className='msg ai'; d.innerHTML='<div class="bubble">'+html+'</div>';
  chat.appendChild(d); scroll();
}

async function userMsg(text){
  const d = document.createElement('div');
  d.className='msg user'; d.innerHTML='<div class="bubble">'+text+'</div>';
  chat.appendChild(d); scroll();
}

async function addCard(html, delay=700){
  await typing(delay);
  const d = document.createElement('div');
  d.innerHTML = html;
  chat.appendChild(d.firstElementChild); scroll();
}

function divider(label){
  const d = document.createElement('div');
  d.className='section-divider';
  d.innerHTML='<div class="line"></div><div class="label">'+label+'</div><div class="line"></div>';
  chat.appendChild(d); scroll();
}

function chips(options){
  return new Promise(resolve=>{
    const row = document.createElement('div');
    row.className='chips-row';
    options.forEach(o=>{
      const b = document.createElement('button');
      b.className='chip'; b.textContent=o;
      b.onclick=()=>{
        b.classList.add('picked'); row.classList.add('used');
        resolve(o);
      };
      row.appendChild(b);
    });
    chat.appendChild(row); scroll();
  });
}

/* ===== TTS ===== */
function resetAvatar(){
  avatarVid.src='https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Idle_state.mp4';
  document.getElementById('ttsBar').classList.remove('show');
}

function stopTTS(){
  if(_audio){ _audio.pause(); _audio=null }
  resetAvatar();
}

async function speak(text){
  stopTTS();
  try{
    avatarVid.src='https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Speaking_State.mp4';
    document.getElementById('ttsBar').classList.add('show');
    const r = await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+VOICE_ID,{
      method:'POST',
      headers:{'Content-Type':'application/json','xi-api-key':ELEVEN_KEY},
      body:JSON.stringify({
        text: text,
        model_id:'eleven_multilingual_v2',
        voice_settings:{stability:0.5,similarity_boost:0.8,style:0.4}
      })
    });
    if(!r.ok) throw new Error('TTS '+r.status);
    const blob = await r.blob();
    _audio = new Audio(URL.createObjectURL(blob));
    _audio.play().catch(()=>{});
  } catch(e){ console.warn('TTS:',e); resetAvatar() }
}

function speakAndWait(text){
  return new Promise(async resolve=>{
    stopTTS();
    try{
      avatarVid.src='https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Speaking_State.mp4';
      document.getElementById('ttsBar').classList.add('show');
      const r = await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+VOICE_ID,{
        method:'POST',
        headers:{'Content-Type':'application/json','xi-api-key':ELEVEN_KEY},
        body:JSON.stringify({
          text: text,
          model_id:'eleven_multilingual_v2',
          voice_settings:{stability:0.5,similarity_boost:0.8,style:0.4}
        })
      });
      if(!r.ok) throw new Error('TTS '+r.status);
      const blob = await r.blob();
      _audio = new Audio(URL.createObjectURL(blob));
      _audio.onended=()=>{ resetAvatar(); resolve() };
      _audio.onerror=()=>{ resetAvatar(); resolve() };
      _audio.play().catch(()=>{ resetAvatar(); resolve() });
    } catch(e){ console.warn('TTS:',e); resetAvatar(); resolve() }
  });
}
