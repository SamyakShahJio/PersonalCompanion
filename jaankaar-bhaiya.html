<title>Jaankaar Bhaiya | JioBharatIQ</title>
<style>
/* ===== JDS FONTS ===== */
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

/* ===== JDS DESIGN TOKENS ===== */
:root{
  --primary-20:#e8e8fc;--primary-30:#9999ff;--primary-40:#6464ff;--primary-50:#3535f3;
  --primary-60:#000093;--primary-70:#00004c;--primary-80:#010029;
  --secondary-20:#fef7e9;--secondary-30:#ffe3ae;--secondary-40:#ffd947;--secondary-50:#f7ab20;
  --secondary-60:#ac660c;--secondary-70:#7f4b10;--secondary-80:#401d0c;
  --sparkle-20:#e8faf7;--sparkle-30:#a7f6e9;--sparkle-40:#7aebd9;--sparkle-50:#1eccb0;
  --sparkle-60:#1e7b74;--sparkle-70:#0e5c4f;--sparkle-80:#08332c;
  --error:#fa2f40;--warning:#f06d0f;--success:#25ab21;
  --grey-100:#141414;--grey-80:rgba(0,0,0,0.66);--grey-60:#b5b5b5;
  --grey-40:#e0e0e0;--grey-20:#f5f5f5;--white:#ffffff;--black:#141414;
  --surface-default:#ffffff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad;--surface-minimal:#f5f5f5;--surface-moderate:#e3e3e4;
  --text-high:#141414;--text-low:rgba(25,27,30,0.65);--text-disabled:rgba(25,27,30,0.38);
  --text-on-bold:#ffffff;
  --icon-medium:#170054;--icon-high:#141414;
  --stroke-subtle:rgba(36,38,43,0.12);--stroke-minimal:rgba(36,38,43,0.13);
  --sp-3xs:4px;--sp-2xs:6px;--sp-xs:8px;--sp-s:12px;--sp-base:14px;
  --sp-m:16px;--sp-l:20px;--sp-xl:24px;--sp-2xl:32px;--sp-3xl:40px;--sp-4xl:48px;
  --shape-xs:4px;--shape-sm:8px;--shape-md:12px;--shape-lg:16px;--shape-xl:24px;
  --shape-2xl:32px;--shape-pill:999px;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'JioType';background:var(--grey-100);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== PHONE FRAME ===== */
.phone-frame{width:100%;max-width:390px;height:100dvh;max-height:844px;margin:0 auto;
  background:var(--surface-default);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:500px){.phone-frame{border-radius:var(--shape-2xl);border:8px solid #222;margin-top:20px;
  height:calc(100dvh - 40px)}}

/* ===== HEADER ===== */
.chat-header{height:56px;padding:0 var(--sp-m);display:flex;align-items:center;gap:var(--sp-s);
  border-bottom:1px solid var(--stroke-subtle);background:var(--surface-default);flex-shrink:0;z-index:10}
.chat-header .back-btn{width:24px;height:24px;color:var(--icon-high);display:flex;align-items:center}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center}
.chat-header .avatar video{width:100%;height:100%;object-fit:cover}
.chat-header .header-info{flex:1;min-width:0}
.chat-header .header-title{font-size:16px;font-weight:700;color:var(--text-high)}
.chat-header .header-status{font-size:12px;font-weight:500;color:var(--sparkle-50);display:flex;align-items:center;gap:4px}
.chat-header .header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sparkle-50)}

/* Persona selector */
.persona-selector{position:relative}
.persona-btn{display:flex;align-items:center;gap:var(--sp-3xs);padding:var(--sp-3xs) var(--sp-xs);
  border-radius:var(--shape-pill);background:var(--surface-ghost);font-size:13px;font-weight:700;color:var(--text-high)}
.persona-btn svg{width:16px;height:16px;color:var(--text-low);transition:transform 0.2s}
.persona-btn.open svg{transform:rotate(180deg)}
.persona-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:260px;background:var(--surface-default);
  border-radius:var(--shape-lg);box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:var(--sp-xs);
  display:none;z-index:100}
.persona-dropdown.show{display:block;animation:msgIn 0.2s ease}
.persona-option{display:flex;align-items:center;gap:var(--sp-s);padding:var(--sp-s);
  border-radius:var(--shape-md);width:100%;text-align:left;transition:background 0.15s}
.persona-option:hover{background:var(--surface-ghost)}
.persona-option.active{background:var(--primary-20)}
.persona-option .p-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0}
.persona-option .p-info .p-name{font-size:14px;font-weight:700;color:var(--text-high)}
.persona-option .p-info .p-desc{font-size:12px;font-weight:500;color:var(--text-low);margin-top:2px}

/* ===== CHAT BODY ===== */
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:var(--sp-m);display:flex;flex-direction:column;gap:var(--sp-s);
  scroll-behavior:smooth}

/* Messages */
.msg{max-width:85%;animation:msgIn 0.35s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg .bubble{padding:var(--sp-s) var(--sp-m);font-size:15px;font-weight:500;line-height:1.5}
.msg.ai .bubble{background:var(--surface-ghost);color:var(--text-high);
  border-radius:var(--shape-xs) var(--shape-lg) var(--shape-lg) var(--shape-lg)}
.msg.user .bubble{background:var(--primary-50);color:var(--text-on-bold);
  border-radius:var(--shape-lg) var(--shape-xs) var(--shape-lg) var(--shape-lg)}

/* Typing indicator */
.typing{align-self:flex-start;display:none}
.typing .bubble{background:var(--surface-ghost);border-radius:var(--shape-xs) var(--shape-lg) var(--shape-lg) var(--shape-lg);
  padding:var(--sp-s) var(--sp-l);display:flex;gap:4px;align-items:center}
.typing .dot{width:7px;height:7px;border-radius:50%;background:var(--grey-60);animation:typingAnim 1.4s ease infinite}
.typing .dot:nth-child(2){animation-delay:0.2s}
.typing .dot:nth-child(3){animation-delay:0.4s}

/* Chips */
.chips-row{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-self:flex-start;animation:msgIn 0.35s ease}
.chip{padding:var(--sp-xs) var(--sp-m);border-radius:var(--shape-pill);border:1.5px solid var(--primary-50);
  font-size:14px;font-weight:700;color:var(--primary-50);background:var(--surface-default);
  transition:all 0.15s;white-space:nowrap}
.chip:active{background:var(--primary-50);color:var(--text-on-bold)}
.chips-row.disabled{pointer-events:none;opacity:0.38}
.chip.selected{background:var(--primary-50);color:var(--text-on-bold)}

/* ===== SPECIAL CARDS ===== */
.card{border-radius:var(--shape-lg);padding:var(--sp-l);animation:msgIn 0.35s ease;align-self:flex-start;
  max-width:90%;width:100%}

/* Context card (memory/data) */
.context-card{background:var(--secondary-20);border:1px solid var(--secondary-30)}
.context-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--secondary-60);margin-bottom:var(--sp-xs)}
.context-card .card-text{font-size:15px;font-weight:500;line-height:1.5;color:var(--text-high)}

/* Data card (spending, stats) */
.data-card{background:var(--surface-ghost);border:1px solid var(--stroke-subtle)}
.data-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--text-low);margin-bottom:var(--sp-s)}
.data-row{display:flex;align-items:center;gap:var(--sp-s);padding:var(--sp-xs) 0;
  border-bottom:1px solid var(--stroke-subtle)}
.data-row:last-child{border-bottom:none}
.data-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.data-name{font-size:14px;font-weight:500;color:var(--text-high);flex:1}
.data-value{font-size:14px;font-weight:700;color:var(--text-high)}

/* Progress card */
.progress-card{background:var(--sparkle-20);border:1px solid var(--sparkle-30)}
.progress-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--sparkle-60);margin-bottom:var(--sp-s)}
.progress-bar{width:100%;height:6px;border-radius:var(--shape-pill);background:rgba(0,0,0,0.08);
  overflow:hidden;margin:var(--sp-xs) 0}
.progress-fill{height:100%;border-radius:var(--shape-pill);background:var(--sparkle-50);transition:width 0.6s ease}
.progress-stats{display:flex;justify-content:space-between;font-size:13px;font-weight:700}
.progress-stats .done{color:var(--sparkle-60)}
.progress-stats .remaining{color:var(--text-low)}

/* Nudge card */
.nudge-card{border:1px solid var(--stroke-subtle);display:flex;align-items:center;gap:var(--sp-s)}
.nudge-icon{width:40px;height:40px;border-radius:var(--shape-md);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;color:var(--white)}
.nudge-title{font-size:14px;font-weight:700;color:var(--text-high);line-height:1.3}
.nudge-sub{font-size:12px;font-weight:500;color:var(--text-low);margin-top:2px}

/* Celebration card */
.celebration-card{text-align:center;padding:var(--sp-xl) var(--sp-l)}
.celebration-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:var(--sp-s)}
.celebration-card .celebration-icon{margin-bottom:var(--sp-s)}
.celebration-card .celebration-quote{font-size:18px;font-weight:700;line-height:1.6;color:var(--text-high);
  margin-bottom:var(--sp-s)}
.celebration-card .celebration-signoff{font-size:14px;font-weight:500;color:var(--text-low);line-height:1.5}

.celebrate-amit{background:var(--secondary-20);border:1px solid var(--secondary-30)}
.celebrate-amit .card-label{color:var(--secondary-60)}
.celebrate-priya{background:var(--primary-20);border:1px solid var(--primary-30)}
.celebrate-priya .card-label{color:var(--primary-50)}
.celebrate-raju{background:var(--sparkle-20);border:1px solid var(--sparkle-30)}
.celebrate-raju .card-label{color:var(--sparkle-60)}

/* Summary card */
.summary-card{background:var(--surface-ghost);border:1px solid var(--stroke-subtle)}
.summary-card .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5%;
  color:var(--text-low);margin-bottom:var(--sp-s)}
.summary-card .mood-arc{display:flex;align-items:center;gap:var(--sp-xs);margin-bottom:var(--sp-s)}
.summary-card .arc-dot{width:10px;height:10px;border-radius:50%}
.summary-card .arc-line{flex:1;height:2px;border-radius:var(--shape-pill)}
.summary-card .summary-text{font-size:15px;font-weight:500;line-height:1.5;color:var(--text-high)}
.summary-card .summary-time{font-size:13px;font-weight:700;color:var(--primary-50);margin-top:var(--sp-s);
  display:flex;align-items:center;gap:var(--sp-xs)}

/* ===== INPUT BAR ===== */
.input-bar{padding:var(--sp-xs) var(--sp-m) var(--sp-m);background:var(--surface-default);
  border-top:1px solid var(--stroke-subtle);flex-shrink:0;display:flex;align-items:center;gap:var(--sp-xs)}
.jds-chat-input{background:var(--surface-ghost);border-radius:var(--shape-pill);padding:var(--sp-xs) var(--sp-s);
  display:flex;align-items:center;gap:var(--sp-xs);flex:1}
.jds-chat-input input{flex:1;border:none;background:none;font-family:'JioType';font-size:15px;
  font-weight:500;color:var(--text-high);outline:none;min-width:0}
.jds-chat-input input::placeholder{color:var(--text-disabled)}
.jds-chat-input .icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:var(--icon-medium);flex-shrink:0}
.speak-btn{width:44px;height:44px;border-radius:50%;background:var(--surface-bold);color:var(--text-on-bold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.speak-btn:active{transform:scale(0.92)}
.speak-btn svg{width:22px;height:22px}

/* TTS bar */
.tts-pause-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--grey-100);
  color:var(--white);border-radius:var(--shape-pill);padding:var(--sp-xs) var(--sp-l);
  display:none;align-items:center;gap:var(--sp-s);font-size:13px;font-weight:700;z-index:50;
  box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.tts-pause-bar.show{display:flex}
.tts-pause-bar button{color:var(--white);display:flex;align-items:center}

/* Listening state */
.input-bar.listening .jds-chat-input{display:none}
.input-bar.listening .speak-btn{display:none}
.input-bar.listening .listening-content{display:flex}
.listening-content{display:none;flex-direction:column;align-items:center;gap:var(--sp-s);width:100%;padding:var(--sp-s) 0}
.listening-label{font-size:13px;font-weight:700;color:var(--primary-50);display:flex;align-items:center;gap:var(--sp-xs)}
.listening-label .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--error);animation:pulse-dot 1.2s infinite}
.listening-wave{display:flex;align-items:center;gap:3px;height:32px}
.listening-wave .bar{width:3px;border-radius:var(--shape-pill);background:var(--primary-50);animation:waveAnim 1s ease-in-out infinite}
.listening-wave .bar:nth-child(1){animation-delay:0s;height:8px}
.listening-wave .bar:nth-child(2){animation-delay:0.1s;height:16px}
.listening-wave .bar:nth-child(3){animation-delay:0.2s;height:24px}
.listening-wave .bar:nth-child(4){animation-delay:0.3s;height:32px}
.listening-wave .bar:nth-child(5){animation-delay:0.4s;height:24px}
.listening-wave .bar:nth-child(6){animation-delay:0.5s;height:16px}
.listening-wave .bar:nth-child(7){animation-delay:0.6s;height:8px}
.listening-wave .bar:nth-child(8){animation-delay:0.7s;height:16px}
.listening-wave .bar:nth-child(9){animation-delay:0.8s;height:24px}
.listening-wave .bar:nth-child(10){animation-delay:0.9s;height:16px}
.listening-wave .bar:nth-child(11){animation-delay:1s;height:8px}
.listening-cancel{font-size:13px;font-weight:700;color:var(--text-low);padding:var(--sp-xs) var(--sp-m);
  border-radius:var(--shape-pill);background:var(--surface-ghost)}

/* ===== ANIMATIONS ===== */
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes typingAnim{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes waveAnim{0%,100%{height:8px;opacity:0.4}50%{height:100%;opacity:1}}

/* Scrollbar */
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--grey-40);border-radius:var(--shape-pill)}
</style>
</head>

/* ===== GLOBALS ===== */
let currentPersona = 'amit';
let currentState = 'idle';
let stateTransitioning = false;
const chatArea = document.getElementById('chatArea');
const typingEl = document.getElementById('typingIndicator');
const chatInput = document.getElementById('chatInput');
const ttsPauseBar = document.getElementById('ttsPauseBar');
let _currentAudio = null;
let _ttsCache = new Map();
let _audioCtx = null;

/* ===== ELEVENLABS TTS ===== */
const TTS_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const TTS_MODEL = 'eleven_multilingual_v2';

function unlockAudio(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
}

async function speakText(text, voiceId){
  const key = text + voiceId;
  let url = _ttsCache.get(key);
  if(!url){
    try{
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
        method:'POST',headers:{'Content-Type':'application/json','xi-api-key':TTS_KEY},
        body:JSON.stringify({text,model_id:TTS_MODEL,voice_settings:{stability:0.6,similarity_boost:0.8}})
      });
      if(!res.ok) throw new Error('TTS failed');
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      _ttsCache.set(key, url);
    }catch(e){
      console.warn('TTS error, using browser fallback',e);
      return new Promise(r=>{
        const u=new SpeechSynthesisUtterance(text);u.lang='hi-IN';u.onend=()=>r();
        speechSynthesis.speak(u);
      });
    }
  }
  return new Promise(resolve=>{
    stopTTS();
    const a = new Audio(url);
    _currentAudio = a;
    ttsPauseBar.classList.add('show');
    document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Speaking_State.mp4';
    a.onended = ()=>{ finishTTS(); resolve(); };
    a.onerror = ()=>{ finishTTS(); resolve(); };
    a.play().catch(()=>{ finishTTS(); resolve(); });
  });
}

function stopTTS(){
  if(_currentAudio){_currentAudio.pause();_currentAudio.currentTime=0;_currentAudio=null;}
  finishTTS();
}

function finishTTS(){
  ttsPauseBar.classList.remove('show');
  document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Idle_state.mp4';
}

document.getElementById('ttsPauseBtn').onclick = ()=> stopTTS();

/* ===== HELPERS ===== */
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function scrollToBottom(){ setTimeout(()=>{ chatArea.scrollTop = chatArea.scrollHeight; },50); }
function showTyping(){ typingEl.style.display='block'; chatArea.appendChild(typingEl); scrollToBottom(); }
function hideTyping(){ typingEl.style.display='none'; }

async function addMsg(type, html, delay=600){
  showTyping(); await wait(delay); hideTyping();
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${html}</div>`;
  chatArea.appendChild(div); scrollToBottom(); return div;
}

async function addRaw(html, delay=600){
  showTyping(); await wait(delay); hideTyping();
  const div = document.createElement('div');
  div.innerHTML = html;
  const child = div.firstElementChild;
  chatArea.appendChild(child); scrollToBottom(); return child;
}

function addChips(options, callback){
  const row = document.createElement('div');
  row.className = 'chips-row';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = opt;
    btn.onclick = ()=>{
      hideListening(); unlockAudio();
      row.classList.add('disabled'); btn.classList.add('selected');
      addMsg('user', opt, 100); callback(opt);
    };
    row.appendChild(btn);
  });
  chatArea.appendChild(row); scrollToBottom();
  const tryListen = ()=>{
    if(row.classList.contains('disabled')) return;
    if(_currentAudio && !_currentAudio.paused && !_currentAudio.ended){ setTimeout(tryListen, 500); }
    else { showListeningAutoSelect(row); }
  };
  setTimeout(tryListen, 300);
}

function showListeningAutoSelect(chipRow){
  showListening();
  _listeningTimeout = setTimeout(()=>{
    hideListening();
    const chips = chipRow.querySelectorAll('.chip');
    if(chips.length && !chipRow.classList.contains('disabled')) chips[0].click();
  }, 3000);
}

/* ===== FLOW ENGINE ===== */
async function startFlow(){
  chatArea.querySelectorAll('.msg,.card,.chips-row').forEach(el=>el.remove());
  stateTransitioning = false; currentState = 'greeting';
  const p = PERSONAS[currentPersona];

  await wait(500);

  // ACT 1: Context card + greeting
  await addRaw(`<div class="card context-card"><div class="card-label">${p.memoryLabel}</div><div class="card-text">${p.memoryText}</div></div>`, 800);
  await addMsg('ai', p.greeting, 1000);
  await speakText(p.greeting, p.voiceId);

  currentState = 'act1-response';
  addChips(p.flow[0].options, (choice)=> handleAct1(choice));
}

async function handleAct1(choice){
  if(stateTransitioning) return; stateTransitioning = true; currentState = 'act2';
  const p = PERSONAS[currentPersona];
  const responses = p.flow[1][choice];
  if(responses){
    for(const item of responses){
      if(item.type === 'ai'){ await addMsg('ai', item.text, 800); await speakText(item.text, p.voiceId); }
      else if(item.type === 'chips'){ stateTransitioning = false; addChips(item.options, (c)=> handleAct2(c)); return; }
    }
  }
  stateTransitioning = false;
}

async function handleAct2(choice){
  if(stateTransitioning) return; stateTransitioning = true; currentState = 'data';
  const p = PERSONAS[currentPersona];

  // Show data card if persona has one (Amit's spending)
  if(p.dataCard){
    let rowsHtml = p.dataCard.rows.map(r=>`<div class="data-row"><span class="data-dot" style="background:${r.color}"></span><span class="data-name">${r.name}</span><span class="data-value">${r.value}</span></div>`).join('');
    rowsHtml += `<div class="data-row" style="border-top:2px solid var(--grey-40);padding-top:var(--sp-s)"><span class="data-dot" style="background:transparent"></span><span class="data-name" style="font-weight:700">Total</span><span class="data-value" style="color:var(--error)">${p.dataCard.total}</span></div>`;
    await addRaw(`<div class="card data-card"><div class="card-label">${p.dataCard.label}</div>${rowsHtml}</div>`, 800);
  }

  // Deepening conversation
  for(const item of p.deepening){
    if(item.type === 'ai'){ await addMsg('ai', item.text, 1000); await speakText(item.text, p.voiceId); }
    else if(item.type === 'chips'){ stateTransitioning = false; addChips(item.options, (c)=> handleDeepening(c)); return; }
  }
  stateTransitioning = false;
}

async function handleDeepening(choice){
  if(stateTransitioning) return; stateTransitioning = true; currentState = 'deepening-2';
  const p = PERSONAS[currentPersona];
  const lastItem = p.deepening[p.deepening.length - 1];
  let responseText;
  if(lastItem.type === 'branched' && lastItem.responses[choice]) responseText = lastItem.responses[choice];
  else if(lastItem.type === 'branched') responseText = Object.values(lastItem.responses)[0];
  if(responseText){ await addMsg('ai', responseText, 1000); await speakText(responseText, p.voiceId); }

  await wait(1500);

  // ACT 3: Mood shift / positive data
  currentState = 'mood-shift';
  const ms = p.moodShift;

  // Show progress card if available
  if(p.progressCard){
    const pc = p.progressCard;
    await addRaw(`<div class="card progress-card"><div class="card-label">${pc.label}</div><div class="progress-bar"><div class="progress-fill" style="width:${pc.pct}%"></div></div><div class="progress-stats"><span class="done">${pc.saved} saved</span><span class="remaining">${pc.target} target</span></div></div>`, 800);
  }

  await addMsg('ai', ms.trigger, 1000);
  await speakText(ms.trigger, p.voiceId);

  for(const item of ms.followUp){
    if(item.type === 'chips'){ stateTransitioning = false; addChips(item.options, (c)=> handleMoodShift(c)); return; }
  }
  stateTransitioning = false;
}

async function handleMoodShift(choice){
  if(stateTransitioning) return; stateTransitioning = true; currentState = 'mood-shift-2';
  const p = PERSONAS[currentPersona];
  const followUpItem = p.moodShift.followUp.find(i=>i.type==='branched');
  let responseText;
  if(followUpItem?.responses[choice]) responseText = followUpItem.responses[choice];
  else if(followUpItem) responseText = Object.values(followUpItem.responses)[0];
  if(responseText){ await addMsg('ai', responseText, 800); await speakText(responseText, p.voiceId); }

  await wait(1500);

  // ACT 4: Reflection + Celebration
  currentState = 'celebration';
  const cel = p.celebration;
  const reflectionText = getReflection(currentPersona);
  await addMsg('ai', reflectionText, 1000);
  await speakText(reflectionText, p.voiceId);

  await wait(800);
  await addRaw(`<div class="card celebration-card ${cel.cardClass}"><div class="card-label">${cel.label}</div><div class="celebration-icon">${cel.icon}</div><div class="celebration-quote">${cel.quote}</div><div class="celebration-signoff">${cel.signoff}</div></div>`, 800);

  await wait(1500);

  // ACT 5: Sign-off
  currentState = 'signoff';
  const so = p.signOff;
  await addRaw(`<div class="card summary-card"><div class="card-label">AAJ KI BAAT</div><div class="mood-arc"><div class="arc-dot" style="background:${so.startMood}"></div><div class="arc-line" style="background:linear-gradient(90deg,${so.startMood},${so.midMood})"></div><div class="arc-dot" style="background:${so.midMood}"></div><div class="arc-line" style="background:linear-gradient(90deg,${so.midMood},${so.endMood})"></div><div class="arc-dot" style="background:${so.endMood}"></div></div><div class="summary-text">${so.summary}</div><div class="summary-time"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M10 4h4a1 1 0 100-2h-4a1 1 0 000 2zm8.71 2.71a1 1 0 101.41-1.42l-1.41-1.41a1 1 0 10-1.42 1.41l1.42 1.42zM12 5a8.5 8.5 0 108.5 8.5A8.51 8.51 0 0012 5zm1 8a1 1 0 01-2 0V9a1 1 0 012 0v4z" fill="currentColor"/></svg>${so.nextTime}</div></div>`, 800);
  currentState = 'done';
}

function getReflection(persona){
  switch(persona){
    case 'amit': return 'Chhote, overall achha hafte tha. Savings track pe hai, gym chal raha hai. Bas Swiggy wala fix karna hai — woh tere aur 2 lakh ke beech mein hai. Tu kar sakta hai.';
    case 'priya': return 'Priya, tune aaj achha kiya — honest thi apne baare mein. Career shift easy nahi hota, specially jab ghar wale dusra chahte hain. Par tu apne liye lad rahi hai. Yeh matter karta hai.';
    case 'raju': return 'Raju bhai, chhoti chhoti cheezein — paani, walk, maa ke paise — yeh sab jud ke badi zindagi banati hain. Tu akela nahi hai, main hoon na.';
    default: return '';
  }
}

/* ===== INPUT / LISTENING ===== */
const inputBar = document.getElementById('inputBar');
const listeningCancel = document.getElementById('listeningCancel');
let _listeningTimeout = null;

function showListening(){
  inputBar.classList.add('listening');
  document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Listening_state.mp4';
}
function hideListening(){
  inputBar.classList.remove('listening');
  document.querySelector('.avatar video').src = 'https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/states/Light/Idle_state.mp4';
  if(_listeningTimeout){ clearTimeout(_listeningTimeout); _listeningTimeout = null; }
}

function simulateVoiceInput(){
  unlockAudio();
  if(currentState === 'idle'){ startFlow(); return; }
  const activeRow = document.querySelector('.chips-row:not(.disabled)');
  if(!activeRow) return;
  const chips = activeRow.querySelectorAll('.chip');
  if(!chips.length) return;
  showListening();
  _listeningTimeout = setTimeout(()=>{ hideListening(); chips[0].click(); }, 3000);
}

document.getElementById('speakBtn').onclick = ()=> simulateVoiceInput();
listeningCancel.onclick = ()=> hideListening();

chatInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && chatInput.value.trim()){
    const text = chatInput.value.trim(); chatInput.value = '';
    addMsg('user', text, 100);
  }
});

/* ===== INIT ===== */
document.addEventListener('click', unlockAudio, {once:true});
document.addEventListener('touchstart', unlockAudio, {once:true});
setTimeout(()=> startFlow(), 800);
</script>
