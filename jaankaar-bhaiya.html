<!DOCTYPE html>
<html lang="hi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Accountability Buddy | JioBharatIQ</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

:root{
  --primary-20:#e8e8fc;--primary-30:#9999ff;--primary-40:#6464ff;--primary-50:#3535f3;
  --primary-60:#000093;--primary-70:#00004c;
  --secondary-20:#fef7e9;--secondary-30:#ffe3ae;--secondary-40:#ffd947;--secondary-50:#f7ab20;
  --secondary-60:#ac660c;--secondary-70:#7f4b10;
  --sparkle-20:#e8faf7;--sparkle-30:#a7f6e9;--sparkle-40:#7aebd9;--sparkle-50:#1eccb0;
  --sparkle-60:#1e7b74;--sparkle-70:#0e5c4f;
  --error:#fa2f40;--warning:#f06d0f;--success:#25ab21;
  --grey-100:#141414;--grey-80:rgba(0,0,0,0.66);--grey-60:#b5b5b5;
  --grey-40:#e0e0e0;--grey-20:#f5f5f5;--white:#ffffff;--black:#141414;
  --surface-default:#ffffff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad;--surface-minimal:#f5f5f5;
  --text-high:#141414;--text-low:rgba(25,27,30,0.65);--text-disabled:rgba(25,27,30,0.38);
  --text-on-bold:#ffffff;
  --icon-medium:#170054;--icon-high:#141414;
  --stroke-subtle:rgba(36,38,43,0.12);
  --sp-3xs:4px;--sp-2xs:6px;--sp-xs:8px;--sp-s:12px;--sp-base:14px;
  --sp-m:16px;--sp-l:20px;--sp-xl:24px;--sp-2xl:32px;--sp-3xl:40px;
  --shape-xs:4px;--shape-sm:8px;--shape-md:12px;--shape-lg:16px;--shape-xl:24px;
  --shape-2xl:32px;--shape-pill:999px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'JioType';background:var(--grey-100);
  -webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* PHONE */
.phone-frame{width:100%;max-width:390px;height:100dvh;max-height:844px;margin:0 auto;
  background:var(--surface-default);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:500px){.phone-frame{border-radius:var(--shape-2xl);border:8px solid #222;margin-top:20px;
  height:calc(100dvh - 40px)}}
@media(max-width:768px){
  body{background:#fff!important;padding:0!important;align-items:stretch!important}
  .phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;
    border-radius:0!important;box-shadow:none!important;border:none!important;max-width:100%!important;max-height:100%!important}
}

/* HEADER */
.header-nav{height:56px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid var(--stroke-subtle);background:var(--surface-default)}
.header-left{display:flex;align-items:center;gap:8px}
.header-nav .back-btn{width:40px;height:40px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%}
.header-nav .back-btn:active{background:var(--grey-20)}
.header-nav .back-btn svg{width:24px;height:24px;fill:var(--icon-high,#170054)}
.header-title-area{flex:1}
.header-title{font-size:16px;font-weight:500;color:var(--text-high);line-height:1}
.avatar-video-hidden{position:absolute;left:-9999px;width:4px;height:4px;opacity:0;pointer-events:none;overflow:hidden}

/* CHAT */
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:var(--sp-m);display:flex;flex-direction:column;gap:var(--sp-s);
  scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--grey-40);border-radius:var(--shape-pill)}

/* MSG */
.msg{max-width:85%;animation:fadeUp .35s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg .bbl{padding:var(--sp-s) var(--sp-m);font-size:15px;font-weight:500;line-height:1.55}
.msg.ai .bbl{background:var(--surface-ghost);color:var(--text-high);
  border-radius:var(--shape-xs) var(--shape-lg) var(--shape-lg) var(--shape-lg)}
.msg.user .bbl{background:var(--primary-50);color:var(--text-on-bold);
  border-radius:var(--shape-lg) var(--shape-xs) var(--shape-lg) var(--shape-lg)}

/* THINKING */
.thinking-row{display:flex;align-items:center;gap:8px;animation:fadeUp .35s ease;align-self:flex-start}
.thinking-icon{width:28px;height:28px;border-radius:8px;overflow:hidden;flex-shrink:0}
.thinking-icon video{width:100%;height:100%;object-fit:cover}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--primary-50);animation:dotBounce 1.2s infinite}
.thinking-dots span:nth-child(2){animation-delay:.15s}
.thinking-dots span:nth-child(3){animation-delay:.3s}
.thinking-label{font-size:13px;color:var(--text-low);font-weight:400}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-self:flex-start;animation:fadeUp .35s ease}
.chip{padding:var(--sp-xs) var(--sp-m);border-radius:var(--shape-pill);border:1.5px solid var(--primary-50);
  font-size:14px;font-weight:700;color:var(--primary-50);background:var(--surface-default);transition:all .15s}
.chip:active{background:var(--primary-50);color:var(--text-on-bold)}
.chips.off{pointer-events:none;opacity:.38}
.chip.sel{background:var(--primary-50);color:var(--text-on-bold)}

/* ===== CARDS ===== */
.card{border-radius:var(--shape-lg);padding:var(--sp-l);animation:fadeUp .4s ease;align-self:flex-start;
  max-width:92%;width:100%}
.card .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:var(--sp-xs)}

/* context */
.card.ctx{background:#F5F5F5;border:1px solid #F5F5F5}
.card.ctx .label{color:#666}
.card.ctx .body{font-size:14px;font-weight:500;line-height:1.5;color:var(--text-high)}

/* goal breakdown */
.card.goal{background:#F5F5F5;border:1px solid #F5F5F5}
.card.goal .label{color:#666}
.card.goal .big{font-size:32px;font-weight:900;color:var(--text-high);margin:var(--sp-xs) 0}
.card.goal .sub{font-size:13px;font-weight:700;color:var(--text-low);margin-bottom:var(--sp-s)}
.card.goal .row{display:flex;align-items:center;gap:var(--sp-xs);margin-bottom:var(--sp-xs)}
.card.goal .bar-wrap{flex:1;height:6px;border-radius:var(--shape-pill);background:var(--grey-40);overflow:hidden}
.card.goal .bar-fill{height:100%;border-radius:var(--shape-pill);transition:width 1s ease}
.card.goal .rname{font-size:13px;font-weight:500;color:var(--text-high);width:90px;flex-shrink:0}
.card.goal .rval{font-size:13px;font-weight:700;color:var(--text-high);width:55px;text-align:right;flex-shrink:0}

/* voice commit / playback */
.card.voice{background:#FFFFFF;border:1px solid #1A1A1A;text-align:center;padding:var(--sp-xl) var(--sp-l)}
.card.voice .label{color:var(--primary-50)}
.card.voice .wave{display:flex;justify-content:center;gap:3px;height:40px;align-items:center;margin:var(--sp-s) 0}
.card.voice .wave .bar{width:3px;border-radius:var(--shape-pill);background:var(--primary-50)}
.card.voice .rec-status{font-size:14px;font-weight:700;color:var(--primary-50)}
.card.voice .play-btn{width:44px;height:44px;border-radius:50%;background:var(--primary-50);color:var(--text-on-bold);
  display:inline-flex;align-items:center;justify-content:center;margin:var(--sp-s) auto}

/* spending */
.card.spend{background:#F5F5F5;border:1px solid #F5F5F5}
.card.spend .label{color:#666}
.card.spend .srow{display:flex;align-items:center;gap:var(--sp-s);padding:var(--sp-xs) 0}
.card.spend .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card.spend .sname{font-size:14px;font-weight:500;color:var(--text-high);flex:1}
.card.spend .sval{font-size:14px;font-weight:700;color:var(--text-high)}
.card.spend .sbar{height:4px;border-radius:var(--shape-pill);margin:2px 0 var(--sp-xs) 20px;transition:width 1s ease}
.card.spend .stotal{display:flex;justify-content:space-between;padding-top:var(--sp-s);margin-top:var(--sp-xs);
  border-top:1.5px solid var(--grey-40);font-size:14px;font-weight:700}
.card.spend .stotal .tv{color:var(--error)}

/* progress */
.card.prog{background:#F5F5F5;border:1px solid #F5F5F5;text-align:center}
.card.prog .label{color:#666}
.card.prog .ring-wrap{width:120px;height:120px;margin:var(--sp-s) auto;position:relative}
.card.prog .ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.card.prog .ring-bg{fill:none;stroke:var(--sparkle-30);stroke-width:8}
.card.prog .ring-fg{fill:none;stroke:var(--sparkle-50);stroke-width:8;stroke-linecap:round;
  transition:stroke-dashoffset 1.5s ease}
.card.prog .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card.prog .ring-amt{font-size:22px;font-weight:900;color:var(--text-high)}
.card.prog .ring-sub{font-size:11px;font-weight:700;color:var(--text-low)}
.card.prog .prog-info{font-size:13px;font-weight:500;color:var(--text-low);margin-top:var(--sp-xs)}

/* nudge */
.card.nudge{background:var(--surface-default);border:1.5px solid var(--warning);display:flex;align-items:center;gap:var(--sp-s)}
.card.nudge .nicon{width:36px;height:36px;border-radius:var(--shape-md);background:var(--secondary-20);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card.nudge .ntext{font-size:14px;font-weight:700;color:var(--text-high);line-height:1.4}

/* time skip */
.card.skip{background:var(--grey-100);border:none;text-align:center;padding:var(--sp-xl) var(--sp-l);
  align-self:center;max-width:85%}
.card.skip .skip-icon{font-size:24px;font-weight:900;color:var(--grey-60);margin-bottom:var(--sp-xs)}
.card.skip .skip-text{font-size:18px;font-weight:900;color:var(--white)}
.card.skip .skip-bar{width:100%;height:4px;border-radius:var(--shape-pill);background:rgba(255,255,255,0.15);
  margin-top:var(--sp-s);overflow:hidden}
.card.skip .skip-fill{height:100%;border-radius:var(--shape-pill);background:var(--sparkle-50);transition:width 1.2s ease}

/* milestone */
.card.mile{background:var(--sparkle-20);border:1px solid var(--sparkle-30);text-align:center;padding:var(--sp-xl) var(--sp-l)}
.card.mile .label{color:var(--sparkle-60)}
.card.mile .mile-amt{font-size:36px;font-weight:900;color:var(--text-high);margin:var(--sp-xs) 0}
.card.mile .mile-sub{font-size:14px;font-weight:700;color:var(--sparkle-60)}

/* journey */
.card.journey{background:#F5F5F5;border:1px solid #F5F5F5}
.card.journey .label{color:#666}
.card.journey .jline{display:flex;align-items:center;gap:0;margin:var(--sp-s) 0}
.card.journey .jdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid var(--sparkle-50)}
.card.journey .jdot.done{background:var(--sparkle-50)}
.card.journey .jdot.next{border-style:dashed;border-color:var(--grey-60)}
.card.journey .jseg{flex:1;height:2px;background:var(--sparkle-50)}
.card.journey .jseg.next{background:var(--grey-40);border-style:dashed}
.card.journey .jlabels{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--text-low)}
.card.journey .jlabels .jdone{color:var(--sparkle-60)}

/* celebration */
.card.celeb{background:var(--secondary-20);border:1px solid var(--secondary-30);text-align:center;padding:var(--sp-xl)}
.card.celeb .label{color:var(--secondary-60)}
.card.celeb .cquote{font-size:16px;font-weight:700;line-height:1.6;color:var(--text-high);margin:var(--sp-s) 0}
.card.celeb .csign{font-size:13px;font-weight:500;color:var(--text-low)}

/* summary */
.card.summary{background:#F5F5F5;border:1px solid #F5F5F5}
.card.summary .label{color:#666}
.card.summary .stxt{font-size:14px;font-weight:500;color:var(--text-high);line-height:1.5;margin:var(--sp-xs) 0}
.card.summary .stime{font-size:13px;font-weight:700;color:var(--primary-50);display:flex;align-items:center;gap:var(--sp-xs)}

/* INPUT */
.input-container{flex-shrink:0;padding:2px 12px 8px;background:var(--surface-default)}
.input-field-wrap{background:var(--surface-ghost);border-radius:23px;padding:6px;display:flex;flex-direction:column}
.input-text-area{padding:10px 8px;display:flex;align-items:center}
.input-text-area input{font-family:'JioType',sans-serif;font-size:14px;font-weight:400;
  color:var(--text-high);background:transparent;border:none;outline:none;width:100%;line-height:1.3}
.input-text-area input::placeholder{color:var(--text-low)}
.input-actions{display:flex;justify-content:space-between;align-items:center;height:43px}
.input-left-actions{display:flex;gap:2px}
.input-icon-btn{width:36px;height:36px;border-radius:999px;display:flex;align-items:center;
  justify-content:center;background:var(--surface-ghost-icon);border:none;cursor:pointer}
.input-icon-btn:active{opacity:.7}
.input-icon-btn svg{width:20px;height:20px;fill:var(--icon-medium,#170054)}
.speak-btn{background:var(--surface-bold);border:none;border-radius:999px;
  padding:10px 20px;display:flex;align-items:center;gap:8px;cursor:pointer}
.speak-btn:active{opacity:.85}
.speak-btn svg{width:18px;height:18px;fill:#fff}
.speak-btn span{font-family:'JioType',sans-serif;font-weight:700;font-size:14px;color:#fff}
.send-btn{width:36px;height:36px;border-radius:999px;background:var(--primary-50);
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center}
.send-btn svg{width:18px;height:18px;fill:#fff}
.send-btn:active{opacity:.8}
.input-container.listening .input-field-wrap{display:none}

/* TTS */
.tts-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--grey-100);
  color:var(--white);border-radius:var(--shape-pill);padding:var(--sp-xs) var(--sp-l);
  display:none;align-items:center;gap:var(--sp-s);font-size:13px;font-weight:700;z-index:50;
  box-shadow:0 4px 16px rgba(0,0,0,.2)}
.tts-bar.show{display:flex}
.tts-bar button{color:var(--white);display:flex;align-items:center}

/* ANIMS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes waveAnim{0%,100%{height:8px;opacity:.4}50%{height:100%;opacity:1}}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

<script>
/* ===== FLOW DATA ===== */
const FLOW_AMIT = {
  voiceId: 'zT03pEAEi0VHKciJODfn',

  /* --- ACT 1: PAHLI BAAT --- */
  act1: [
    { t:'ai', text:'Hey Amit. Naya hai yahan? Chal koi baat nahi. Bata — koi goal hai jo latkaa hua hai? Savings, fitness, kuch bhi.' },

      ],
      'Bas explore kar raha': [

      ]
    }},
    { t:'ai', text:'₹2 lakh. Done. Tere JioPay ka data dekha — yeh raha breakdown. Dekh kahaan ja raha hai paisa.' },
    { t:'card', card:'goalBreakdown' },
    { t:'ai', text:'₹16,700 mahina bachana padega. Possible hai — Swiggy aur subscriptions mein ₹5K easily cut ho sakta hai. Baaki tu decide kar.' },
    { t:'chips', opts:['Haan samajh aaya','Swiggy toh chahiye yaar','Aur kya cut kar sakta hoon?'] },
    { t:'branch', map:{
      'Haan samajh aaya': [{ t:'ai', text:'Achha. Ek kaam kar — apna goal record kar voice mein. Jab lag raha hoga ki nahi hoga — apni hi awaaz sun lena. Serious mein kaam karta hai.' }],
      'Swiggy toh chahiye yaar': [{ t:'ai', text:'₹7,200 mahine ka Swiggy "chahiye" hai? Tiffin lagwa le ₹3K mein — woh baad mein discuss karenge. Pehle goal record kar.' }],
      'Aur kya cut kar sakta hoon?': [{ t:'ai', text:'₹3,400 subscriptions. Kitne actually use karta hai? Detail baad mein. Pehle apna goal record kar — voice mein.' }]

/* TTS */
async function speak(text, vid){
  const k = text+vid; let url = _ttsCache.get(k);
  if(!url){
    try{
      const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
        method:'POST',headers:{'Content-Type':'application/json','xi-api-key':TTS_KEY},
        body:JSON.stringify({text,model_id:'eleven_multilingual_v2',voice_settings:{stability:.6,similarity_boost:.8}})
      });
      if(!r.ok) throw 0;
      url = URL.createObjectURL(await r.blob()); _ttsCache.set(k,url);
    }catch(e){ return new Promise(r=>{ const u=new SpeechSynthesisUtterance(text);u.lang='hi-IN';u.onend=()=>r();speechSynthesis.speak(u); }); }
  }
  return new Promise(res=>{
    stopTTS();
    const a = new Audio(url); _audio = a;
    ttsBar.classList.add('show');
    avatarV.src = AVATAR_BASE+'Speaking_State.mp4';
    a.onended=()=>{ finTTS(); res(); };
    a.onerror=()=>{ finTTS(); res(); };
    a.play().catch(()=>{ finTTS(); res(); });
  });
}
function stopTTS(){ if(_audio){_audio.pause();_audio.currentTime=0;_audio=null;} finTTS(); }
function finTTS(){ ttsBar.classList.remove('show'); avatarV.src=AVATAR_BASE+'Idle_state.mp4'; }
document.getElementById('ttsStop').onclick=stopTTS;

/* MSG */
async function addAI(text, delay=700){
  showTyp(); await wait(delay); hideTyp();
  const d=document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="bbl">${text}</div>`; chat.appendChild(d); scroll(); return d;
}
async function addUser(text){
  const d=document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="bbl">${text}</div>`; chat.appendChild(d); scroll();
}
async function addCard(html, delay=700){
  showTyp(); await wait(delay); hideTyp();
  const w=document.createElement('div'); w.innerHTML=html;
  const c=w.firstElementChild; chat.appendChild(c); scroll(); return c;
}

function addChips(opts){ return new Promise(res=>{
  const row=document.createElement('div'); row.className='chips';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='chip'; b.textContent=o;
    b.onclick=()=>{ hideListen(); unlock(); row.classList.add('off'); b.classList.add('sel'); addUser(o); res(o); };
    row.appendChild(b);
  });
  chat.appendChild(row); scroll();
  // auto-advance after TTS
  const tryL=()=>{ if(row.classList.contains('off'))return; if(_audio&&!_audio.paused&&!_audio.ended){setTimeout(tryL,500);}else{autoListen(row,res);} };
  setTimeout(tryL,300);
});}

function autoListen(row,res){
  showListen();
  _listenTO=setTimeout(()=>{ hideListen(); const c=row.querySelectorAll('.chip'); if(c.length&&!row.classList.contains('off')){c[0].click();} },3500);
}

/* ===== VOICE RECORDING ANIMATION ===== */
function animateRecording(el){
  const wave = el.querySelector('#recWave');
  const status = el.querySelector('#recStatus');
  if(!wave) return Promise.resolve();
  // Create bars
  for(let i=0;i<15;i++){
    const b=document.createElement('div'); b.className='bar';
    b.style.height=(8+Math.random()*28)+'px';
    b.style.animation=`waveAnim ${0.6+Math.random()*0.6}s ease-in-out infinite`;
    b.style.animationDelay=(i*0.08)+'s';
    wave.appendChild(b);
  }
  return wait(2500).then(()=>{
    wave.querySelectorAll('.bar').forEach(b=>{ b.style.animation='none'; b.style.height='4px'; b.style.background='var(--sparkle-50)'; });
    status.textContent='Saved!';
    status.style.color='var(--sparkle-50)';
  });
}

function animatePlayback(el){
  const wave = el.querySelector('#playWave');
  if(!wave) return Promise.resolve();
  for(let i=0;i<15;i++){
    const b=document.createElement('div'); b.className='bar';
    b.style.height='4px';
    wave.appendChild(b);
  }
  const btn = el.querySelector('#playBtn');
  if(btn) btn.style.display='none';
  // Animate
  wave.querySelectorAll('.bar').forEach((b,i)=>{
    b.style.animation=`waveAnim ${0.5+Math.random()*0.5}s ease-in-out infinite`;
    b.style.animationDelay=(i*0.07)+'s';
  });
  return wait(3000).then(()=>{
    wave.querySelectorAll('.bar').forEach(b=>{ b.style.animation='none'; b.style.height='4px'; b.style.background='var(--sparkle-50)'; });
  });
}

/* ===== FLOW ENGINE ===== */
async function processStep(step, flow){
  const vid = flow.voiceId;
  if(step.t === 'ai'){
    await addAI(step.text, 800);
    await speak(step.text, vid);
  } else if(step.t === 'chips'){
    return await addChips(step.opts);
  } else if(step.t === 'card'){
    const el = await addCard(renderCard(step.card, step), 700);
    if(step.card === 'voiceRecord') await animateRecording(el);
    if(step.card === 'voicePlay') await animatePlayback(el);
    // Animate progress ring
    if(step.card === 'progress'){
      await wait(100);
      const fg = el.querySelector('.ring-fg');
      if(fg) fg.style.strokeDashoffset = 326.73*(1-(step.pct||55)/100);
    }
  }
  return null;
}

async function runSequence(steps, flow){
  let i = 0;
  while(i < steps.length){
    const step = steps[i];
    if(step.t === 'branch'){
      // previous chip choice determines branch
      // handled inline after chips
      i++;
      continue;
    }
    const result = await processStep(step, flow);
    // If chips, look for next branch
    if(step.t === 'chips' && result){
      const nextStep = steps[i+1];
      if(nextStep && nextStep.t === 'branch' && nextStep.map[result]){
        await runSequence(nextStep.map[result], flow);
        i += 2; // skip branch step
        continue;
      }
      i++;
      continue;
    }
    i++;
  }
}

async function runTimeSkip(data, id){
  const el = await addCard(renderCard('skip', {...data, id}), 500);
  await wait(300);
  const fill = document.getElementById('skipFill'+id);
  if(fill) fill.style.width = data.pct+'%';
  await wait(1800);
}

async function runFlow(){
  // Clear
  chat.querySelectorAll('.msg,.card,.chips').forEach(e=>e.remove());
  hideTyp();
  stopTTS();

  const F = FLOW_AMIT;
  await wait(600);

  // ACT 1
  await runSequence(F.act1, F);
  await wait(1000);

  // TIME SKIP 1
  await runTimeSkip(F.skip1, 1);

  // ACT 2
  await runSequence(F.act2, F);
  await wait(1000);

  // TIME SKIP 2
  await runTimeSkip(F.skip2, 2);

  // ACT 3
  await runSequence(F.act3, F);
}

/* INIT */
document.addEventListener('click',unlock,{once:true});

handleInput();
